{% extends "base.html" %}

{% block title %}Log out — Scribe{% endblock %}

{% block content %}
<section class="auth-shell">
  <form class="auth-card" method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <p class="eyebrow">Closing the cover</p>
    <h1>Log out?</h1>
    <p class="muted">Your notes will stay private and available when you return with Google.</p>
    <div class="form-actions">
      <a class="button button-secondary" href="{% url 'notes:list' %}">Stay signed in</a>
      <button class="button button-danger" type="submit">Log out</button>
    </div>
  </form>
</section>
{% endblock %}
